name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e "silent_drift_miner[dev]"

      - name: Run tests (offline only, no network/LLM)
        env:
          SILENT_DRIFT_SKIP_REAL_TOOLCHAIN_SMOKE: "1"
        run: python -m pytest silent_drift_miner/tests/ -v

      - name: Validate existing candidate fixtures
        run: |
          python -m silent_drift_miner.cli validate-candidates \
            data/candidates/spring-boot.jsonl
        working-directory: silent_drift_miner
